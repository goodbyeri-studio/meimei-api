name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      classic: ${{ steps.paths.outputs.classic }}
      docker: ${{ steps.paths.outputs.docker }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: paths
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            changed_files=$(git ls-files)
          else
            changed_files=$(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")
          fi

          if grep -Eq '^(web/classic/|web/package.json$|web/bun.lock$|\.github/workflows/ci\.yml$)' <<<"$changed_files"; then
            echo 'classic=true' >> "$GITHUB_OUTPUT"
          else
            echo 'classic=false' >> "$GITHUB_OUTPUT"
          fi

          if grep -Eq '^(Dockerfile|VERSION$|go\.mod$|go\.sum$|web/|deploy/|docker-compose|\.github/workflows/)' <<<"$changed_files"; then
            echo 'docker=true' >> "$GITHUB_OUTPUT"
          else
            echo 'docker=false' >> "$GITHUB_OUTPUT"
          fi

  governance:
    name: Protected metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify upstream attribution and license markers
        run: |
          grep -Fqi 'New API' README.md
          grep -Fqi 'QuantumNous' README.md
          grep -Fqi 'AGPLv3' README.md
          grep -Fqi 'Section 7' NOTICE
          grep -Fqi 'QuantumNous' NOTICE
          test -s LICENSE

  backend:
    name: Go tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Build embedded default frontend
        working-directory: web/default
        run: bun run build:check
      - name: Build embedded classic frontend
        working-directory: web/classic
        run: bun run build
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run Go tests
        run: go test ./...

  frontend-default:
    name: Default frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Type-check and build default frontend
        working-directory: web/default
        run: bun run build:check

  frontend-classic:
    name: Classic frontend
    needs: changes
    if: needs.changes.outputs.classic == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install web dependencies
        working-directory: web
        run: bun install --filter ./classic --frozen-lockfile
      - name: Build classic frontend
        working-directory: web/classic
        run: bun run build

  docker-smoke:
    name: Production image smoke build
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image without pushing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: meimei-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
