name: PR Check

permissions:
  contents: read
  issues: read
  pull-requests: read

on:
  workflow_dispatch:

jobs:
  pr-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@85daca1880e9e1af197fc06ea03349daf08f4202 # v0.2.1
        with:
          max-failures: 4
          require-description: true

          # require-linked-issue: false
          blocked-terms:  |
            🤖 Generated with Claude Code

          require-pr-template: true
          strict-pr-template-sections: "✅ 提交前检查项 / Checklist"

          detect-spam-usernames: true
          min-account-age: 30

          failure-add-pr-labels: ""
          failure-pr-message: "该 PR 未满足贡献模板或人工验证要求。此检查只提供反馈，不会自动关闭 PR；请补充变更动机、验证结果和人工判断。/ This PR does not yet satisfy the contribution template or human-verification requirements. This check is advisory and will not close the PR automatically; please add the motivation, verification results, and human judgment."
          close-pr: false
