name: ${PERSONAL_DEV_WEB_COMPOSE_PROJECT:-meimei-api-personal-web}

# Local frontend and its self-healing SSH tunnel. The VPS remains the only
# place running the API, database, and cache.
services:
  tunnel:
    build:
      context: ../..
      dockerfile: deploy/personal-dev/Dockerfile.tunnel
    restart: unless-stopped
    env_file:
      - ../../.personal-dev/tunnel.env
    volumes:
      - ../../.personal-dev:/run/personal-dev-host:ro
    ports:
      - "127.0.0.1:${PERSONAL_DEV_LOCAL_API_PORT:-3310}:${PERSONAL_DEV_LOCAL_API_PORT:-3310}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --fail --silent --show-error http://127.0.0.1:$${TUNNEL_LISTEN_PORT}/healthz/ready >/dev/null",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  web-dev:
    image: oven/bun:1.3.14
    restart: unless-stopped
    working_dir: /workspace/web/default
    environment:
      VITE_REACT_APP_SERVER_URL: http://tunnel:${PERSONAL_DEV_LOCAL_API_PORT:-3310}
    volumes:
      - ../..:/workspace
      - bun_cache:/root/.bun/install/cache
      - web_node_modules:/workspace/web/node_modules
      - default_node_modules:/workspace/web/default/node_modules
    command: >
      sh -lc "cd /workspace/web
      && bun install --frozen-lockfile
      && cd default
      && bun run dev --host 0.0.0.0 --port 3000"
    ports:
      - "127.0.0.1:${PERSONAL_DEV_WEB_PORT:-3002}:3000"
    depends_on:
      tunnel:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "Promise.all([fetch('http://127.0.0.1:3000'),fetch('http://127.0.0.1:3000/api/status')]).then(rs => process.exit(rs.every(r => r.ok) ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

volumes:
  bun_cache:
  web_node_modules:
  default_node_modules:
